<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ══════════════════════════════════════════════
       VARIABLES & RESET
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #070604;
      --s1:     #111009;
      --s2:     #1a1813;
      --s3:     #25221a;
      --gold:   #c9a46a;
      --gold2:  #dbbf86;
      --pale:   #f0e4d0;
      --text:   #c8b898;
      --muted:  #7a6a52;
      --border: rgba(201,164,106,.13);
      --bord2:  rgba(201,164,106,.30);
      --disp:   'Cormorant Garamond', Georgia, serif;
      --body:   'Jost', sans-serif;
      --eout:   cubic-bezier(0,0,.2,1);
      --ease:   cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-weight: 300;
      line-height: 1.65;
      overflow-x: hidden;
    }
    body.lock { overflow: hidden; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(201,164,106,.3); border-radius: 3px; }

    /* ── Grain ── */
    #grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 9000; opacity: .04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Cursor ── */
    #cdot, #cring {
      position: fixed; pointer-events: none; z-index: 8999;
      border-radius: 50%; transform: translate(-50%,-50%);
    }
    #cdot  { width: 6px; height: 6px; background: var(--gold); }
    #cring { width: 34px; height: 34px; border: 1px solid rgba(201,164,106,.5);
             transition: width .2s var(--ease), height .2s var(--ease); }
    #cring.hov { width: 52px; height: 52px; }
    @media (pointer:coarse) { #cdot,#cring { display:none; } }

    /* ── Loader ── */
    #loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 7000;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
      transition: opacity .9s, visibility .9s;
    }
    #loader.gone { opacity: 0; visibility: hidden; pointer-events: none; }
    .lring { width: 52px; height: 52px; border: 1px solid var(--bord2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1.1s linear infinite; }
    .ltxt  { font-size: .67rem; letter-spacing: .5em; text-transform: uppercase; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Nav ── */
    #nav {
      position: fixed; top: 0; inset-inline: 0; z-index: 500;
      padding: 1.6rem 2rem; display: flex; align-items: center; justify-content: center; gap: 1.3rem;
      transition: background .4s, padding .35s, border-color .4s;
      border-bottom: 1px solid transparent;
    }
    #nav.sc { background: rgba(7,6,4,.92); backdrop-filter: blur(14px); padding: 1rem 2rem; border-color: var(--border); }
    .ngem  { color: var(--gold); font-size: .52rem; opacity: .5; }
    #nnames { font-family: var(--disp); font-style: italic; font-weight: 300; font-size: 1.05rem; color: var(--pale); letter-spacing: .04em; }

    /* ══════════════════════════════════════════════
       HERO
    ══════════════════════════════════════════════ */
    #hero {
      min-height: 100vh; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    #hero::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 55% at 50% 45%, rgba(201,164,106,.055) 0%, transparent 70%);
    }
    #ptcls { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .ptcl {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
      filter: blur(14px); animation: floatup linear infinite; bottom: -120px;
    }
    @keyframes floatup {
      0%   { transform:translateY(0) scale(1); opacity:0; }
      8%   { opacity:1; }
      88%  { opacity:.22; }
      100% { transform:translateY(-115vh) scale(.7); opacity:0; }
    }

    .hcont { text-align:center; position:relative; z-index:1; padding:2rem 1.5rem; }

    .hpre {
      font-size:.67rem; letter-spacing:.56em; text-transform:uppercase;
      color:var(--gold); font-weight:300; display:block; margin-bottom:2.4rem;
      opacity:0; transform:translateY(10px);
      animation: fuUp .8s .4s var(--eout) forwards;
    }
    .hnames {
      display:flex; align-items:center; justify-content:center;
      gap:clamp(.8rem,3.5vw,3rem); flex-wrap:wrap; margin-bottom:1.8rem;
    }
    .hname {
      font-family:var(--disp); font-style:italic; font-weight:300;
      font-size:clamp(3rem,9vw,8.5rem); color:var(--pale); line-height:1; opacity:0;
    }
    .hname.bride { animation: fxL 1s .65s var(--eout) forwards; }
    .hname.groom { animation: fxR 1s .85s var(--eout) forwards; }
    .hamp {
      font-family:var(--disp); font-style:italic; font-weight:300;
      font-size:clamp(1.8rem,5vw,4.5rem); color:var(--gold); line-height:1;
      opacity:0; animation:fuUp .8s 1.1s var(--eout) forwards;
    }
    .hdiv {
      display:flex; align-items:center; justify-content:center; gap:1.5rem; margin-bottom:1.6rem;
      opacity:0; animation:fuUp .8s 1.25s var(--eout) forwards;
    }
    .hline { display:block; width:clamp(40px,8vw,100px); height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
    .hgem  { color:var(--gold); font-size:.45rem; }
    .hdate, .hvenue {
      font-weight:300; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); opacity:0;
    }
    .hdate  { font-size:.82rem; margin-bottom:.45rem; animation:fuUp .8s 1.4s var(--eout) forwards; }
    .hvenue { font-size:.72rem; margin-bottom:3.8rem;  animation:fuUp .8s 1.5s var(--eout) forwards; }
    .hcta {
      display:inline-flex; flex-direction:column; align-items:center; gap:.8rem;
      text-decoration:none; color:var(--gold); font-size:.68rem;
      letter-spacing:.42em; text-transform:uppercase; font-weight:400;
      opacity:0; animation:fuUp .8s 1.85s var(--eout) forwards; transition:color .3s;
    }
    .hcta:hover { color:var(--gold2); }
    .hctabar {
      display:block; width:1px; height:50px;
      background:linear-gradient(to bottom,var(--gold),transparent);
      animation:pulsev 2.2s 2.5s ease-in-out infinite;
    }
    @keyframes pulsev { 0%,100%{opacity:.45} 50%{opacity:1} }
    @keyframes fuUp  { to { opacity:1; transform:translateY(0); } }
    @keyframes fxL   { from{opacity:0;transform:translateX(-28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fxR   { from{opacity:0;transform:translateX( 28px)} to{opacity:1;transform:translateX(0)} }

    /* ══════════════════════════════════════════════
       SHARED SECTION STYLES
    ══════════════════════════════════════════════ */
    .strip {
      width:100%; height:1px;
      background:linear-gradient(to right,transparent 0%,var(--gold) 30%,var(--gold) 70%,transparent 100%);
      opacity:.14;
    }

    .section {
      max-width: 1380px; margin: 0 auto; padding: 7rem 1.8rem 4rem;
    }

    .shd { text-align:center; margin-bottom:4rem; }
    .spre {
      display:block; font-size:.67rem; font-weight:400;
      letter-spacing:.55em; text-transform:uppercase; color:var(--gold); margin-bottom:.9rem;
    }
    .stitle {
      font-family:var(--disp); font-style:italic; font-weight:300;
      font-size:clamp(2rem,5vw,3.6rem); color:var(--pale); line-height:1.1; margin-bottom:1.5rem;
    }
    .sdiv {
      display:flex; align-items:center; justify-content:center; gap:1.2rem;
    }
    .sdiv span { display:block; width:55px; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
    .sdiv em   { color:var(--gold); font-style:normal; font-size:.45rem; }

    /* ══════════════════════════════════════════════
       VIDEOS SECTION — 3 FILM CARDS
    ══════════════════════════════════════════════ */
    #videos { background: linear-gradient(to bottom, var(--bg) 0%, var(--s1) 60%, var(--bg) 100%); }

    .vgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.6rem;
    }

    .vcard {
      position: relative; cursor: pointer;
      border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
      background: var(--s1);
      opacity: 0; transform: translateY(24px);
      transition: border-color .4s, box-shadow .4s, transform .4s var(--ease);
    }
    .vcard.in { animation: cardIn .65s var(--eout) forwards; }
    @keyframes cardIn { to { opacity:1; transform:translateY(0); } }
    .vcard:hover {
      border-color: var(--bord2);
      box-shadow: 0 0 40px rgba(201,164,106,.08), 0 20px 50px rgba(0,0,0,.5);
      transform: translateY(-6px);
    }

    /* Film reel strip at top */
    .film-strip {
      height: 22px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 4px;
      gap: 5px; overflow: hidden;
    }
    .film-hole {
      width: 10px; height: 13px; border-radius: 1px;
      background: var(--s2); border: 1px solid rgba(201,164,106,.15);
      flex-shrink: 0;
    }

    /* Card content area */
    .vbody {
      aspect-ratio: 16/9; position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(135deg, var(--s1) 0%, var(--s2) 50%, var(--s1) 100%);
      overflow: hidden;
    }
    /* subtle diagonal lines texture */
    .vbody::before {
      content: ''; position: absolute; inset: 0; opacity: .04;
      background-image: repeating-linear-gradient(
        45deg, var(--gold) 0px, var(--gold) 1px, transparent 1px, transparent 12px
      );
    }
    /* golden glow on hover */
    .vcard:hover .vbody::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(201,164,106,.07) 0%, transparent 70%);
    }

    .vicon { color:var(--gold); opacity:.3; transition: opacity .35s; }
    .vcard:hover .vicon { opacity:.6; }
    .vicon svg { width:52px; height:52px; fill:currentColor; }

    .vtitle-wrap { text-align:center; position:relative; z-index:1; }
    .vtitle {
      font-family:var(--disp); font-style:italic; font-weight:300;
      font-size:1.3rem; color:var(--pale); letter-spacing:.02em;
    }
    .vhint {
      display:block; font-size:.6rem; letter-spacing:.35em;
      text-transform:uppercase; color:var(--muted); margin-top:.4rem;
    }

    /* Play button overlay */
    .vovlay {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .3s; z-index:2;
    }
    .vcard:hover .vovlay { opacity:1; }
    .playbtn {
      width:66px; height:66px; border:1.5px solid var(--gold); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition:transform .3s var(--ease);
      background: rgba(7,6,4,.45); backdrop-filter:blur(4px);
    }
    .playbtn::before {
      content:''; position:absolute; width:88px; height:88px;
      border:1px solid rgba(201,164,106,.22); border-radius:50%;
      animation:rp 1.6s ease-out infinite;
    }
    @keyframes rp { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(1.7);opacity:0} }
    .playbtn svg { width:22px; height:22px; fill:var(--gold); margin-left:4px; }
    .vcard:hover .playbtn { transform:scale(1.1); }

    /* Bottom film strip */
    .vfoot {
      height:22px; background:var(--bg);
      border-top:1px solid var(--border);
      display:flex; align-items:center; padding:0 4px; gap:5px;
    }

    /* Label below card */
    .vlabel {
      padding:.9rem 1.2rem;
      display:flex; align-items:center; justify-content:space-between;
      border-top:1px solid var(--border);
    }
    .vtag {
      font-size:.58rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase;
      color:var(--gold); background:rgba(201,164,106,.08); padding:.22rem .55rem; border-radius:2px;
    }
    .vname {
      font-size:.8rem; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    /* ══════════════════════════════════════════════
       PHOTOS SECTION
    ══════════════════════════════════════════════ */
    #photos { padding-top:5rem; }

    .pgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.4rem;
    }
    /* Every 7th photo is wide */
    .pcard:nth-child(7n+1) { grid-column: span 2; }

    .pcard {
      position:relative; cursor:pointer; overflow:hidden; border-radius:2px;
      border:1px solid var(--border); aspect-ratio:4/3;
      background:var(--s1);
      opacity:0; transform:translateY(20px);
      transition:border-color .4s, transform .4s var(--ease);
    }
    .pcard.in { animation:cardIn .6s var(--eout) forwards; }
    .pcard:hover { border-color:var(--bord2); transform:translateY(-5px); }

    /* Photo thumbnail */
    .pthumb {
      width:100%; height:100%; position:relative; overflow:hidden;
    }
    .pthumb img {
      width:100%; height:100%; object-fit:cover; display:block;
      transition:transform .6s var(--ease), filter .4s;
      filter:brightness(.85) saturate(.9);
    }
    .pcard:hover .pthumb img { transform:scale(1.06); filter:brightness(.6) saturate(.8); }

    /* Placeholder when image fails */
    .pph {
      width:100%; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.8rem;
      background:linear-gradient(135deg, var(--s2) 0%, var(--s3) 100%);
    }
    .pph svg { width:36px; height:36px; fill:var(--gold); opacity:.3; }
    .pph span { font-size:.68rem; letter-spacing:.1em; color:var(--muted); }

    /* Corner brackets on hover */
    .pthumb::before, .pthumb::after {
      content:''; position:absolute; z-index:2;
      width:16px; height:16px; border-color:var(--gold); border-style:solid;
      opacity:0; transition:opacity .3s, transform .3s;
    }
    .pthumb::before { top:10px; left:10px;  border-width:1px 0 0 1px; transform:translate(-5px,-5px); }
    .pthumb::after  { bottom:10px; right:10px; border-width:0 1px 1px 0; transform:translate(5px,5px); }
    .pcard:hover .pthumb::before,
    .pcard:hover .pthumb::after { opacity:1; transform:translate(0,0); }

    /* Eye overlay */
    .povlay {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .3s; z-index:1;
    }
    .pcard:hover .povlay { opacity:1; }
    .eyebtn {
      width:56px; height:56px; border:1.5px solid var(--gold); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      background:rgba(7,6,4,.5); backdrop-filter:blur(4px);
      transition:transform .3s var(--ease);
    }
    .eyebtn svg { width:20px; height:20px; fill:var(--gold); }
    .pcard:hover .eyebtn { transform:scale(1.08); }

    /* Photo name bar */
    .pname-bar {
      position:absolute; bottom:0; left:0; right:0; z-index:3;
      padding:.6rem 1rem;
      background:linear-gradient(to top,rgba(7,6,4,.9),transparent);
      opacity:0; transform:translateY(4px);
      transition:opacity .35s, transform .35s;
    }
    .pcard:hover .pname-bar { opacity:1; transform:translateY(0); }
    .pname-bar span {
      font-size:.75rem; color:var(--pale);
      font-family:var(--disp); font-style:italic;
    }

    /* ══════════════════════════════════════════════
       EMPTY / SETUP STATES
    ══════════════════════════════════════════════ */
    .empty-state {
      grid-column:1/-1; text-align:center; padding:4rem 2rem;
    }
    .es-icon { font-size:2.5rem; color:var(--gold); opacity:.3; display:block; margin-bottom:1.2rem; }
    .es-title { font-family:var(--disp); font-style:italic; font-size:1.7rem; color:var(--pale); margin-bottom:.8rem; }
    .es-msg {
      font-size:.83rem; color:var(--muted); max-width:480px;
      margin:0 auto 1.5rem; line-height:1.9;
    }
    .es-code {
      font-family:'Courier New',monospace; font-size:.75rem;
      background:var(--s2); border:1px solid var(--border);
      padding:1.2rem 1.8rem; border-radius:2px;
      display:inline-block; text-align:left; color:var(--gold2);
      white-space:pre; max-width:100%; overflow-x:auto;
    }

    /* ══════════════════════════════════════════════
       MODAL
    ══════════════════════════════════════════════ */
    #modal {
      position:fixed; inset:0; z-index:2000;
      display:flex; align-items:center; justify-content:center; padding:2rem;
      opacity:0; visibility:hidden; transition:opacity .4s var(--ease), visibility .4s;
    }
    #modal.open { opacity:1; visibility:visible; }
    #mback {
      position:absolute; inset:0; background:rgba(4,3,2,.96);
      backdrop-filter:blur(12px); cursor:pointer;
    }
    #mbox {
      position:relative; z-index:1; width:100%; max-width:1120px;
      background:var(--s1); border:1px solid var(--bord2);
      box-shadow:0 40px 100px rgba(0,0,0,.7);
      transform:scale(.95) translateY(18px); transition:transform .45s var(--ease);
    }
    #modal.open #mbox { transform:scale(1) translateY(0); }
    #mhead {
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 1.4rem; border-bottom:1px solid var(--border);
    }
    #mlabel { font-size:.78rem; font-weight:300; letter-spacing:.1em; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #mclose {
      background:none; border:1px solid var(--border); color:var(--muted);
      width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:.75rem;
      display:flex; align-items:center; justify-content:center; margin-left:1rem; flex-shrink:0;
      transition:border-color .3s, color .3s;
    }
    #mclose:hover { border-color:var(--gold); color:var(--gold); }
    #mbody { position:relative; padding-bottom:56.25%; height:0; }
    #mframe { position:absolute; inset:0; width:100%; height:100%; border:none; background:var(--bg); }
    /* Photo mode: full image instead of iframe */
    #mbody.photo-mode { padding-bottom:0; height:auto; display:flex; align-items:center; justify-content:center; }
    #mbody.photo-mode #mframe { display:none; }
    #mimg { max-width:100%; max-height:85vh; display:none; object-fit:contain; }
    #mbody.photo-mode #mimg { display:block; }

    /* ── Footer ── */
    #footer {
      border-top:1px solid var(--border); padding:4rem 2rem 3rem;
      text-align:center; margin-top:5rem;
    }
    .ftin { display:flex; align-items:center; justify-content:center; gap:1.5rem; margin-bottom:.7rem; }
    .fgem { color:var(--gold); font-size:.48rem; opacity:.4; }
    .fphrase { font-family:var(--disp); font-style:italic; font-size:1.05rem; color:var(--muted); }
    .fnote { font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:var(--s3); margin-top:.5rem; }

    /* ══════════════════════════════════════════════
       RESPONSIVE & TOUCH OPTIMIZATIONS
    ══════════════════════════════════════════════ */
    
    /* Touch Devices Optimizations (Disable desktop hover effects & enable static overlays) */
    @media (hover: none) {
      .vcard:hover {
        transform: none !important;
        border-color: var(--border) !important;
        box-shadow: none !important;
      }
      .pcard:hover {
        transform: none !important;
        border-color: var(--border) !important;
      }
      .pcard:hover .pthumb img {
        transform: none !important;
        filter: brightness(.85) saturate(.9) !important;
      }
      .pcard:hover .pthumb::before,
      .pcard:hover .pthumb::after {
        opacity: 0 !important;
      }
      .pcard:hover .povlay {
        opacity: 0 !important;
      }
      
      /* Make sure video overlay and play button are visible statically */
      .vovlay {
        opacity: 1 !important;
      }
      .vicon {
        opacity: 0.4 !important;
      }
      .playbtn {
        width: 52px !important;
        height: 52px !important;
        transform: none !important;
        background: rgba(7,6,4,.65) !important;
      }
      .playbtn svg {
        width: 18px !important;
        height: 18px !important;
        margin-left: 3px !important;
      }
      .playbtn::before {
        display: none !important; /* Disable cpu-heavy animations on mobile */
      }
      
      /* Keep the photo title bar visible on touch screens */
      .pname-bar {
        opacity: 1 !important;
        transform: translateY(0) !important;
        padding: .5rem .8rem !important;
        background: linear-gradient(to top, rgba(7,6,4,.85) 0%, rgba(7,6,4,.3) 70%, transparent 100%) !important;
      }
      .pname-bar span {
        font-size: .68rem !important;
      }
    }

    /* General responsive grids layout adjustments */
    .pgrid {
      grid-auto-flow: dense;
    }

    /* Tablets & Laptops (max-width: 1024px) */
    @media (max-width: 1024px) {
      .section { padding: 5rem 2rem 3rem; }
      .vgrid {
        grid-template-columns: 1fr;
        max-width: 580px;
        margin: 0 auto;
        gap: 2rem;
      }
      #videos { padding-bottom: 2rem; }
    }

    /* Mobile screens (max-width: 768px) */
    @media (max-width: 768px) {
      .section { padding: 4rem 1.2rem 2.5rem; }
      .shd { margin-bottom: 2.5rem; }
      .stitle { margin-bottom: 1.2rem; }
      
      #nav { padding: 1rem 1.2rem; gap: .8rem; }
      #nnames { font-size: .95rem; max-width: 75vw; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
      
      #footer { padding: 3rem 1.5rem 2rem; margin-top: 3.5rem; }
      .fphrase { font-size: .95rem; }
    }

    /* Small Mobiles (max-width: 640px) */
    @media (max-width: 640px) {
      .hnames { flex-direction: column; gap: .1rem; }
      .hname { font-size: clamp(2.4rem, 11vw, 3.8rem); }
      .hamp { font-size: 1.8rem; }
      .hdate { font-size: .75rem; letter-spacing: .2em; }
      .hvenue { font-size: .65rem; letter-spacing: .18em; margin-bottom: 2.8rem; }
      
      .pgrid {
        grid-template-columns: repeat(2, 1fr);
        gap: .8rem;
      }
      .pcard:nth-child(7n+1) { grid-column: span 1; }
      .pcard { aspect-ratio: 1/1; } /* square aspect ratio is extremely clean in a 2-column mobile grid */
      
      #modal { padding: .6rem; align-items: center; }
      #mbox { border-color: var(--border); }
      #mhead { padding: .7rem 1rem; }
      #mlabel { font-size: .72rem; }
      #mclose { width: 28px; height: 28px; font-size: .7rem; }
    }
  </style>
</head>

<body class="lock">
  <div id="grain"></div>
  <div id="cdot"></div>
  <div id="cring"></div>

  <!-- Loader -->
  <div id="loader">
    <div class="lring"></div>
    <p class="ltxt">Loading your memories</p>
  </div>

  <!-- Nav -->
  <nav id="nav">
    <span class="ngem">◆</span>
    <span id="nnames"></span>
    <span class="ngem">◆</span>
  </nav>

  <main>
    <!-- ─── HERO ──────────────────────────────────── -->
    <section id="hero">
      <div id="ptcls"></div>
      <div class="hcont">
        <span class="hpre">The Wedding Of</span>
        <div class="hnames">
          <h1 class="hname bride" id="hbride"></h1>
          <span class="hamp">&amp;</span>
          <h1 class="hname groom" id="hgroom"></h1>
        </div>
        <div class="hdiv">
          <span class="hline"></span><span class="hgem">◆</span><span class="hline"></span>
        </div>
        <p class="hdate"  id="hdate"></p>
        <p class="hvenue" id="hvenue"></p>
        <a href="#videos" class="hcta">Explore Memories<span class="hctabar"></span></a>
      </div>
    </section>

    <div class="strip"></div>

    <!-- ─── VIDEOS ────────────────────────────────── -->
    <div id="videos">
      <section class="section">
        <div class="shd">
          <span class="spre">Wedding Films</span>
          <h2 class="stitle">The Wedding Videos</h2>
          <div class="sdiv"><span></span><em>◆</em><span></span></div>
        </div>
        <div class="vgrid" id="vgrid"></div>
      </section>
    </div>

    <div class="strip"></div>

    <!-- ─── PHOTOS ────────────────────────────────── -->
    <section class="section" id="photos">
      <div class="shd">
        <span class="spre">Cherished Moments</span>
        <h2 class="stitle">The Photographs</h2>
        <div class="sdiv"><span></span><em>◆</em><span></span></div>
      </div>
      <div class="pgrid" id="pgrid"></div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer">
    <div class="ftin">
      <span class="fgem">◆</span>
      <span class="fphrase">A celebration of love &amp; togetherness</span>
      <span class="fgem">◆</span>
    </div>
    <p class="fnote">Wedding Gallery · Served from Google Drive</p>
  </footer>

  <!-- Modal -->
  <div id="modal" role="dialog" aria-modal="true">
    <div id="mback"></div>
    <div id="mbox">
      <div id="mhead">
        <span id="mlabel"></span>
        <button id="mclose" aria-label="Close">✕</button>
      </div>
      <div id="mbody">
        <iframe id="mframe" allowfullscreen allow="autoplay"></iframe>
        <img id="mimg" alt="Wedding photo">
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
  /* ════════════════════════════════════════════════
     UTILITIES
  ════════════════════════════════════════════════ */
  const C = typeof WEDDING_CONFIG !== 'undefined' ? WEDDING_CONFIG : (window.WEDDING_CONFIG || {});

  // Extract Google Drive file ID from a share link or bare ID
  function getId(link) {
    if (!link) return null;
    const m = link.match(/\/file\/d\/([a-zA-Z0-9_-]{20,})/);
    if (m) return m[1];
    const m2 = link.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
    if (m2) return m2[1];
    if (/^[a-zA-Z0-9_-]{25,}$/.test(link.trim())) return link.trim();
    return null;
  }

  function isPlaceholder(link) {
    return !link || link.includes('PASTE_') || link.includes('YOUR_');
  }

  /* ── Cursor ── */
  const cdot  = document.getElementById('cdot');
  const cring = document.getElementById('cring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function tick(){
    rx+=(mx-rx)*.14; ry+=(my-ry)*.14;
    cdot.style.cssText  =`left:${mx}px;top:${my}px`;
    cring.style.cssText =`left:${rx}px;top:${ry}px`;
    requestAnimationFrame(tick);
  })();
  document.addEventListener('mouseover',e=>{
    if(e.target.closest('a,button,.vcard,.pcard')) cring.classList.add('hov');
    else cring.classList.remove('hov');
  });

  /* ── Particles ── */
  (function(){
    const c=document.getElementById('ptcls');
    for(let i=0;i<26;i++){
      const p=document.createElement('div'); p.className='ptcl';
      const sz=Math.random()*70+16, dur=Math.random()*8+9, del=Math.random()*10, op=Math.random()*.17+.04;
      p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${dur}s;animation-delay:-${del}s;opacity:${op}`;
      c.appendChild(p);
    }
  })();

  /* ── Nav scroll ── */
  const nav=document.getElementById('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('sc',scrollY>60),{passive:true});

  /* ── Hero text ── */
  const bride=C.brideName||'Bride', groom=C.groomName||'Groom';
  document.title=`${bride} & ${groom} — Wedding Gallery`;
  document.getElementById('nnames').textContent=`${bride} & ${groom}`;
  document.getElementById('hbride').textContent=bride;
  document.getElementById('hgroom').textContent=groom;
  const dEl=document.getElementById('hdate');  dEl.textContent=C.weddingDate||'';  if(!C.weddingDate)  dEl.style.display='none';
  const vEl=document.getElementById('hvenue'); vEl.textContent=C.weddingVenue||''; if(!C.weddingVenue) vEl.style.display='none';

  /* ── Dismiss loader ── */
  function dismissLoader(){ document.getElementById('loader').classList.add('gone'); document.body.classList.remove('lock'); }

  /* ── Intersection observer for card reveals ── */
  const revObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const i = parseInt(e.target.dataset.i||0) % 4;
        e.target.style.animationDelay = `${i*90}ms`;
        e.target.classList.add('in');
        revObs.unobserve(e.target);
      }
    });
  },{threshold:.05});

  /* ── Film hole helper ── */
  function filmHoles(n=14){
    let h=''; for(let i=0;i<n;i++) h+=`<div class="film-hole"></div>`; return h;
  }

  /* ════════════════════════════════════════════════
     RENDER VIDEOS
  ════════════════════════════════════════════════ */
  function renderVideos(){
    const grid = document.getElementById('vgrid');
    const videos = Array.isArray(C.videos) ? C.videos : [];
    const real = videos.filter(v => !isPlaceholder(v.link));

    if(real.length === 0){
      grid.innerHTML = `
        <div class="empty-state">
          <p class="es-title" style="font-family: var(--body); font-style: normal; font-size: 1.1rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;">NOT AVAILABLE</p>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    real.forEach((v,i)=>{
      const id   = getId(v.link);
      const name = v.name || `Video ${i+1}`;
      const card = document.createElement('div');
      card.className='vcard'; card.dataset.i=i;
      card.innerHTML=`
        <div class="film-strip">${filmHoles()}</div>
        <div class="vbody">
          <div class="vicon">
            <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
          </div>
          <div class="vtitle-wrap">
            <p class="vtitle">${name}</p>
            <span class="vhint">Click to Watch</span>
          </div>
          <div class="vovlay">
            <div class="playbtn">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
        <div class="vfoot">${filmHoles()}</div>
        <div class="vlabel">
          <span class="vtag">VIDEO</span>
          <span class="vname">${name}</span>
        </div>`;
      if(id) card.addEventListener('click',()=>openModal(id,'video',name));
      else   card.style.cursor='default';
      grid.appendChild(card);
      revObs.observe(card);
    });
  }

  /* ════════════════════════════════════════════════
     RENDER PHOTOS
  ════════════════════════════════════════════════ */
  function renderPhotos(){
    const grid = document.getElementById('pgrid');
    const photos = Array.isArray(C.photos) ? C.photos : [];
    const real = photos.filter(p => !isPlaceholder(p.link));

    if(real.length === 0){
      grid.innerHTML = `
        <div class="empty-state">
          <p class="es-title" style="font-family: var(--body); font-style: normal; font-size: 1.1rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;">NOT AVAILABLE</p>
        </div>`;
      return;
    }

    grid.innerHTML = '';
    real.forEach((p,i)=>{
      const id   = getId(p.link);
      const name = p.name || `Photo ${i+1}`;
      const thumb= id ? `https://drive.google.com/thumbnail?id=${id}&sz=w640` : '';
      const card = document.createElement('div');
      card.className='pcard'; card.dataset.i=i;

      const imgHtml = thumb
        ? `<img src="${thumb}" alt="${name}" loading="lazy" onerror="this.parentElement.innerHTML=\`${phHtml(name)}\`">`
        : phHtml(name);

      card.innerHTML=`
        <div class="pthumb">
          ${imgHtml}
          <div class="povlay"><div class="eyebtn"><svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 7.61 17 4.5 12 4.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></div></div>
          <div class="pname-bar"><span>${name}</span></div>
        </div>`;
      if(id) card.addEventListener('click',()=>openModal(id,'photo',name));
      else   card.style.cursor='default';
      grid.appendChild(card);
      revObs.observe(card);
    });
  }

  function phHtml(name){
    return `<div class="pph"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg><span>${name}</span></div>`;
  }

  /* ════════════════════════════════════════════════
     MODAL
  ════════════════════════════════════════════════ */
  const modal  = document.getElementById('modal');
  const mframe = document.getElementById('mframe');
  const mimg   = document.getElementById('mimg');
  const mbody  = document.getElementById('mbody');
  const mlabel = document.getElementById('mlabel');

  function openModal(id, type, name){
    mlabel.textContent = name;
    if(type === 'photo'){
      mbody.classList.add('photo-mode');
      mimg.src = `https://drive.google.com/uc?export=view&id=${id}`;
      mframe.src = '';
    } else {
      mbody.classList.remove('photo-mode');
      mframe.src = `https://drive.google.com/file/d/${id}/preview`;
      mimg.src = '';
    }
    modal.classList.add('open');
    document.body.classList.add('lock');
  }

  function closeModal(){
    modal.classList.remove('open');
    document.body.classList.remove('lock');
    mframe.src=''; mimg.src='';
  }

  document.getElementById('mclose').addEventListener('click', closeModal);
  document.getElementById('mback').addEventListener('click', closeModal);
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

  /* ════════════════════════════════════════════════
     BOOT
  ════════════════════════════════════════════════ */
  window.addEventListener('DOMContentLoaded',()=>{
    setTimeout(()=>{
      renderVideos();
      renderPhotos();
      dismissLoader();
    }, 900);
  });
  </script>
</body>
</html>
